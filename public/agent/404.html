<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; URL=/">
    <title>Redirecting...</title>
    <script>
      // Single Page App - redirect to root for client-side routing
      const path = window.location.pathname;
      const redirectPath = path.replace(/\/zod-client-demo/, '');
      window.location.href = redirectPath || '/';
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/">home page</a>...</p>
  </body>
</html>
